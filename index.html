<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Favicon-->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Page title shown in browser tab -->
    <title>To-Do List with Weather API</title>
</head>


<body>
    <!--- button for change the background image and color-->
    <header>
        <div class="controls">
            <div id="click">
                <span class="btn-click">click</span>
            </div>

            <!--change background (Scene)-->
            <div id="changeBackground" class="pill-btn" title="Scene">
                <span class="pill-icon">🖼️</span>
                <span class="pill-label">Scene</span>
            </div>

            <!--  accent colour picker -->
            <div id="accentBtn" title="Accent colour">
                <span>🎨</span>
            </div>

            <!--  text colour picker -->
            <div id="textBtn" title="Text colour">
                <span>T</span>
            </div>

            <!-- brightness / dark-mode toggle (Light) -->
            <div id="brightnessBtn" class="pill-btn" title="Brightness">
                <span class="pill-icon">☀</span>
                <span class="pill-label">Light</span>
            </div>
        </div>

        <!-- Scene (background gradient) popup -->
        <div id="scenePopup" class="color-popup scene-popup">
            <p class="popup-label">Scene</p>
            <div class="scene-grid" id="sceneSwatches">
                <span class="scene-swatch" data-scene="dawn"><span class="scene-name">Dawn</span></span>
                <span class="scene-swatch" data-scene="golden"><span class="scene-name">Golden</span></span>
                <span class="scene-swatch" data-scene="forest"><span class="scene-name">Forest</span></span>
                <span class="scene-swatch" data-scene="dusk"><span class="scene-name">Dusk</span></span>
                <span class="scene-swatch" data-scene="desert"><span class="scene-name">Desert</span></span>
                <span class="scene-swatch" data-scene="sea"><span class="scene-name">Sea</span></span>
                <span class="scene-swatch" data-scene="dandelion"><span class="scene-name">Dandelion</span></span>
                <span class="scene-swatch" data-scene="rose"><span class="scene-name">Rose</span></span>
                <span class="scene-swatch" data-scene="mountain"><span class="scene-name">Mountain</span></span>
            </div>
        </div>

        <!-- Accent colour popup -->
        <div id="accentPopup" class="color-popup">
            <p class="popup-label">Accent colour</p>
            <div class="swatch-grid" id="accentSwatches">
                <span class="color-swatch" data-color="#f77512"></span>
                <span class="color-swatch" data-color="#e74c3c"></span>
                <span class="color-swatch" data-color="#9b59b6"></span>
                <span class="color-swatch" data-color="#3498db"></span>
                <span class="color-swatch" data-color="#2ecc71"></span>
                <span class="color-swatch" data-color="#f1c40f"></span>
                <span class="color-swatch" data-color="#e91e63"></span>
                <span class="color-swatch swatch-white" data-color="#ffffff"></span>
            </div>
            <label class="custom-color-label">Custom <input type="color" id="accentColor" value="#f77512"></label>
        </div>

        <!-- Text colour popup -->
        <div id="textPopup" class="color-popup">
            <p class="popup-label">Text colour</p>
            <div class="swatch-grid" id="textSwatches">
                <span class="color-swatch swatch-offwhite" data-color="#f6f4f2"></span>
                <span class="color-swatch swatch-white" data-color="#ffffff"></span>
                <span class="color-swatch" data-color="#000000"></span>
                <span class="color-swatch" data-color="#2c3e50"></span>
                <span class="color-swatch" data-color="#e74c3c"></span>
                <span class="color-swatch" data-color="#27ae60"></span>
                <span class="color-swatch" data-color="#3498db"></span>
                <span class="color-swatch" data-color="#f39c12"></span>
            </div>
            <label class="custom-color-label">Custom <input type="color" id="textColor" value="#f6f4f2"></label>
        </div>

        <!-- overlay used to darken the page when "Light" is toggled to dark -->
        <div id="bgOverlay"></div>
    </header>


    <main>
        <div class="container">

            <div class="row">
                <!-- to-do list -->
                <div class="col-12 col-md-9 mt-5">
                    <header>
                        <!-- Title with icon -->
                        <h1 class="fw-bold text-center to-do-title">
                            To-Do List
                        </h1>
                    </header>

                    <!-- To-do app card -->
                    <div class="todo-app">

                        <!--Tasks counter-->
                        <div id="task-counter">
                            <span id="remaining-tasks">0</span>/<span id="total-tasks">0</span>
                        </div>
                        <!-- Input and button row -->
                        <div class="todo-input-container">
                            <!-- Task input field -->
                            <input type="text" id="inputbox-todo" placeholder="Add a new task...">

                            <!-- Add task button -->
                            <button id="add-btn" onclick="addTodo()">Add</button>
                        </div>
                        <div>
                            <!-- Task list container -->
                            <ul id="list-container">

                            </ul>
                        </div>
                    </div>
                </div>


                <div class="col-12 col-md-3 time-weather">
                    <!-- date-->
                    <div class="date-time">
                        <div class="date-session">
                            <span id="day">00</span>
                            <span>.</span>
                            <span id="month">00</span>
                            <span>.</span>
                            <span id="year">0000</span>
                        </div>
                        <!--time  -->
                        <div class="time-session">
                            <span id="hrs">00</span>
                            <span>:</span>
                            <span id="min">00</span>
                            <span>:</span>
                            <span id="sec">00</span>
                        </div>
                    </div>


                    <!--weather API -->
                    <div class="weather-container">

                        <!-- Search box where user enters city name -->
                        <div class="search-box">
                            <!-- Input field for typing the city -->
                            <input type="text" id="city-input" placeholder="Enter city name">

                            <!-- Button to trigger search (uses Font Awesome icon) -->
                            <button id="search-btn" class="btn" onclick="checkWeather()" title="Search" aria-label="Search city">
                                <i class="fa-brands fa-sistrix"></i>
                            </button>
                        </div>

                        <!-- Weather information display section -->
                        <div class="weather-info">
                            <i class="fa-solid fa-xmark"></i>
                            <div class="weather-box">
                                <div class="box">
                                    <!-- Container for weather details -->
                                    <div class="info-weather">
                                        <div class="weather">

                                            <!-- Weather icon (changes based on condition) -->
                                            <img id="weather-icon" src="assets/images/clear.png" alt="Weather Icon"
                                                class="img-fluid">

                                            <!-- Weather description (e.g., Sunny, Rainy) -->
                                            <p class="description">Sunny</p>

                                            <!-- Temperature display -->
                                            <p class="temperature">
                                                16<span>°C</span>
                                            </p>

                                            <!-- City name display -->
                                            <p class="city">some where</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Additional weather details (e.g., humidity) -->
                            <div class="weather-details">
                                <!-- Humidity icon and value -->
                                <div class="humidity">
                                    <img src="assets/images/humidity.png" alt="Humidity Icon" class="img-fluid">
                                    <div class="text">
                                        <div class="info-humidity">
                                            <span>60%</span>
                                            <p class="humidity-text">Humidity</p>
                                        </div>
                                    </div>
                                </div>
                                <!-- Wind icon and value -->
                                <div class="wind">
                                    <img src="assets/images/wind.png" alt="Wind Icon" class="img-fluid">
                                    <div class="text">
                                        <div class="info-wind">
                                            <span>10 km/h</span>
                                            <p class="wind-text">Wind Speed</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>



                    </div>
                </div>


            </div>
        </div>
    </main>
    <!-- Custom JavaScript -->
    <script src="assets/js/script.js"></script>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/68e551a4bc.js" crossorigin="anonymous"></script>
</body>


</html>>
