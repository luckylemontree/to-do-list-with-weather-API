<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Google Fonts: Alegreya for headings, Nunito for body text -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@700&family=Nunito:wght@400;600;700&display=swap"
        rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- Page title shown in browser tab -->
    <title>To-Do List with Weather API</title>
</head>


<body>
    <!-- Main container -->
    <div class="container">

        <!-- To-do app card -->
        <div class="todo-app">

            <!-- Title with icon -->
            <h1 class="fw-bold">
                To-Do List
                <img src="assets/images/iconToDoList.png" alt="To-Do List Icon" class="img-fluid" />
            </h1>

            <!-- Input and button row -->
            <div class="row">

                <!-- Task input field -->
                <input type="text" id="inputbox-todo" placeholder="Add a new task...">

                <!-- Add task button -->
                <button id="add-btn" onclick="addTodo()">Add</button>

            </div>
            <!-- Task list container -->
            <ul id="list-container">
                <!--<li class="checked">Task 1</li>
                <li>Task 2</li>
                <li>Task 3</li>-->
            </ul>
        </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="assets/js/script.js"></script>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
